name: Deploy Web App

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'packages/web/**'
      - 'packages/shared/**'

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build web app
        run: cd packages/web && npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      # Note: For automatic Vercel deployments, connect the packages/web
      # directory as a Vercel project. Vercel will auto-deploy on push.
      # This workflow is a fallback for manual builds/verification.
